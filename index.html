<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural DJ | Core</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/addons/p5.sound.min.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00ff41; --secondary: #ff003c; --bg: #050505; }
        body { margin: 0; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: var(--accent); display: flex; flex-direction: column; align-items: center; }
        
        .ui-header { width: 100%; border-bottom: 1px solid #1a1a1a; padding: 20px 0; text-align: center; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; width: 600px; }
        .module { background: #000; border: 1px solid #1a1a1a; padding: 10px; border-radius: 4px; }
        .val { display: block; font-size: 1.5rem; color: #fff; }

        #viewport { position: relative; border: 1px solid #333; line-height: 0; }
        
        .action-bar { margin: 20px 0; }
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: #000; }

        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scanline { width: 200px; height: 2px; background: var(--accent); animation: scan 2s linear infinite; }
        @keyframes scan { from { opacity: 0; } 50% { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="scanline"></div>
        <p style="margin-top: 20px; letter-spacing: 2px;">SYNCING_NEURAL_NETS...</p>
    </div>

    <div class="ui-header">
        <h2 style="margin: 0; font-weight: 400; font-size: 1.2rem;">CORE_DJ_INTERFACE_v1.0.4</h2>
    </div>

    <div class="dashboard">
        <div class="module">GAIN <span id="v_out" class="val">--</span></div>
        <div class="module">PITCH <span id="s_out" class="val">--</span></div>
        <div class="module">FILTER <span id="b_out" class="val">--</span></div>
    </div>

    <div id="viewport"></div>

    <div class="action-bar">
        <button onclick="handleIO()">I/O_SIGNAL</button>
        <button onclick="skipTrack()">CYCLE_BUFFER</button>
    </div>

    <script>
        let stream, net, data = [], src, lpf, fft;
        let ptr = 0;
        const lib = [
            "https://upload.wikimedia.org/wikipedia/commons/b/bb/Test_of_vocal_and_instrumental_music.mp3",
            "https://raw.githubusercontent.com/the-pudding/world-music/master/assets/music/1.mp3"
        ];

        function preload() {
            src = loadSound(lib[ptr]);
        }

        function setup() {
            const c = createCanvas(600, 400);
            c.parent('viewport');
            
            stream = createCapture(VIDEO);
            stream.size(600, 400);
            stream.hide();

            const cfg = {
                architecture: 'MobileNetV1',
                imageScaleFactor: 0.3,
                multiplier: 0.50,
                outputStride: 16
            };

            net = ml5.poseNet(stream, cfg, () => {
                document.getElementById('boot-screen').style.display = 'none';
            });
            
            net.on('pose', r => data = r);

            lpf = new p5.LowPass();
            fft = new p5.FFT();
            src.disconnect();
            src.connect(lpf);
        }

        function handleIO() {
            userStartAudio();
            src.isPlaying() ? src.pause() : src.play();
        }

        function draw() {
            background(0);
            push();
            translate(width, 0);
            scale(-1, 1);
            image(stream, 0, 0, width, height);
            pop();

            const spec = fft.analyze();
            stroke(varColor('--accent'));
            noFill();
            beginShape();
            for (let i = 0; i < spec.length; i += 10) {
                let y = map(spec[i], 0, 255, height, height - 100);
                vertex(i, y);
            }
            endShape();

            if (data.length > 0) {
                const { leftWrist: l, rightWrist: r } = data[0].pose;

                if (l.confidence > 0.2) {
                    const g = constrain(map(l.y, height, 0, 0, 1), 0, 1);
                    src.setVolume(g);
                    document.getElementById('v_out').innerText = `${Math.round(g * 100)}%`;
                    renderNode(width - l.x, l.y, varColor('--accent'));
                }

                if (r.confidence > 0.2) {
                    const s = constrain(map(r.y, height, 0, 0.5, 2), 0.5, 2);
                    src.rate(s);
                    document.getElementById('s_out').innerText = `${s.toFixed(1)}x`;
                    
                    const f = map(r.x, 0, width, 200, 4000);
                    lpf.freq(f);
                    document.getElementById('b_out').innerText = f < 1000 ? 'ACTIVE' : 'BYPASS';
                    renderNode(width - r.x, r.y, varColor('--secondary'));
                }
            }
        }

        function varColor(v) {
            return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
        }

        function renderNode(x, y, c) {
            fill(c); noStroke(); ellipse(x, y, 8);
            stroke(c); noFill(); ellipse(x, y, 16 + sin(frameCount * 0.2) * 5);
        }

        function skipTrack() {
            src.stop();
            ptr = (ptr + 1) % lib.length;
            src = loadSound(lib[ptr], () => {
                src.play();
                src.disconnect();
                src.connect(lpf);
            });
        }
    </script>
</body>
</html>
